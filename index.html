<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calorie Tracker</title>
  <link rel="icon" type="image/png" href="app-icon.png?v=1">
  <link rel="apple-touch-icon" href="app-icon.png?v=1">
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Calorie Tracker">
  <link rel="stylesheet" href="style.css?v=20260510-0715">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <h1>Calorie Tracker</h1>
        <p class="subtle-text">Daily intake and weekly trend</p>
      </div>
    </header>

    <nav class="date-controls" aria-label="Diet day controls">
      <button id="prevDayBtn" class="icon-btn" type="button" aria-label="Previous day">‹</button>
      <label class="date-field" for="diet-day">
        <span id="diet-day-label">Today</span>
        <input id="diet-day" type="date" aria-label="Selected day" />
      </label>
      <button id="nextDayBtn" class="icon-btn" type="button" aria-label="Next day">›</button>
    </nav>

    <div id="daily-result"></div>

    <div id="quickEntryBackdrop" class="quick-entry-backdrop" hidden></div>

    <form id="today-form" class="settlement-form">
      <div class="quick-entry-header">
        <div>
          <strong>Quick Entry</strong>
          <span>Calories first, protein next.</span>
        </div>
        <button id="closeQuickEntryBtn" class="icon-btn" type="button" aria-label="Close quick entry">×</button>
      </div>

      <label class="input-card" for="calories">
        <span class="input-label">Calories</span>
        <span class="input-unit">kcal</span>
        <input id="calories" type="number" inputmode="numeric" min="0" step="1" placeholder="2430" required />
      </label>

      <label class="input-card" for="protein">
        <span class="input-label">Protein</span>
        <span class="input-unit">grams</span>
        <input id="protein" type="number" inputmode="decimal" min="0" step="0.1" placeholder="168" required />
      </label>

      <button id="saveBtn" class="primary-btn commit-btn" type="submit">Commit Today</button>
    </form>

    <div class="form-actions">
      <div id="status" role="status" aria-live="polite"></div>
      <button id="deleteBtn" class="danger-btn" type="button" hidden>Delete Entry</button>
    </div>

    <details class="settings-panel">
      <summary>Targets</summary>
      <form id="targets-form" class="targets-form">
        <label>
          <span>TDEE</span>
          <input id="tdeeInput" type="number" inputmode="numeric" min="1" step="1" />
        </label>
        <label>
          <span>Protein target</span>
          <input id="proteinTargetInput" type="number" inputmode="numeric" min="1" step="1" />
        </label>
        <label>
          <span>Deficit target</span>
          <input id="deficitTargetInput" type="number" inputmode="numeric" min="0" step="1" />
        </label>
        <button class="secondary-btn" type="submit">Save Targets</button>
      </form>
    </details>

    <div id="weekly-summary"></div>
  </main>

  <script src="app.js?v=20260510-0715"></script>
</body>
</html>
