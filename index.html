<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calorie Tracker</title>
  <link rel="icon" type="image/png" href="app-icon-v2.png?v=2">
  <link rel="apple-touch-icon" href="app-icon-v2.png?v=2">
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Calorie Tracker">
  <link rel="stylesheet" href="style.css?v=20260511-0756">
</head>
<body class="auth-locked">
  <section id="accessGate" class="access-gate" aria-label="Access gate">
    <form id="accessForm" class="access-card">
      <input
        type="text"
        name="username"
        autocomplete="username"
        value="calorie-tracker"
        hidden
      />
      <span class="access-label">Private Tracker</span>
      <h2>Access key</h2>
      <p>Enter your private key once on this device.</p>
      <input
        id="accessKeyInput"
        name="password"
        type="password"
        autocomplete="current-password"
        placeholder="Access key"
        required
      />
      <button class="primary-btn" type="submit">Unlock</button>
      <p id="accessError" class="access-error"></p>
    </form>
  </section>

  <main class="app-shell">
    <header class="app-header">
      <div>
        <h1>Calorie Tracker</h1>
        <p class="subtle-text">Daily intake and weekly trend</p>
      </div>
    </header>

    <nav class="date-controls" aria-label="Diet day controls">
      <button id="prevDayBtn" class="icon-btn" type="button" aria-label="Previous day">‹</button>
      <button id="diet-day" class="date-field" type="button" aria-label="Selected day">
        <span id="diet-day-label">Today</span>
      </button>
      <button id="nextDayBtn" class="icon-btn" type="button" aria-label="Next day">›</button>
    </nav>

    <div id="daily-result"></div>

    <div id="quickEntryBackdrop" class="quick-entry-backdrop" hidden></div>
    <div id="calendarBackdrop" class="calendar-backdrop" hidden></div>

    <section id="calendarPanel" class="calendar-panel" role="dialog" aria-modal="true" aria-label="Date picker" hidden>
      <div class="calendar-header">
        <strong id="calendarTitle">Select date</strong>
        <button id="closeCalendarBtn" class="icon-btn calendar-close-btn" type="button" aria-label="Close date picker">×</button>
        <span id="calendarMonthLabel" class="calendar-month-label"></span>
      </div>
      <div class="calendar-weekdays-fixed" aria-hidden="true">
        <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
      </div>
      <div id="calendarGrid" class="calendar-months"></div>
    </section>

    <div id="deleteConfirmBackdrop" class="delete-confirm-backdrop" hidden></div>
    <section id="deleteConfirmPanel" class="delete-confirm-panel" role="dialog" aria-modal="true" aria-labelledby="deleteConfirmTitle" aria-describedby="deleteConfirmText" hidden>
      <div>
        <strong id="deleteConfirmTitle">Delete entry?</strong>
        <p id="deleteConfirmText">This removes the selected day's calories and protein.</p>
      </div>
      <div class="delete-confirm-actions">
        <button id="cancelDeleteBtn" class="secondary-btn" type="button">Cancel</button>
        <button id="confirmDeleteBtn" class="danger-btn" type="button">Delete</button>
      </div>
    </section>

    <form id="today-form" class="settlement-form">
      <div class="quick-entry-header">
        <div>
          <strong>Quick entry</strong>
          <span>Calories first, protein next.</span>
        </div>
        <button id="closeQuickEntryBtn" class="icon-btn" type="button" aria-label="Close quick entry">×</button>
      </div>

      <label class="input-card" for="calories">
        <span class="input-label">Calories</span>
        <div class="input-value-row">
          <input id="calories" type="number" inputmode="numeric" min="0" step="1" required />
          <span class="input-unit">kcal</span>
        </div>
      </label>

      <label class="input-card" for="protein">
        <span class="input-label">Protein</span>
        <div class="input-value-row">
          <input id="protein" type="number" inputmode="numeric" min="0" step="1" required />
          <span class="input-unit" data-unit="protein">g</span>
        </div>
      </label>

      <button id="saveBtn" class="primary-btn commit-btn" type="submit">Commit today</button>
      <button id="deleteBtn" class="danger-btn" type="button" hidden>Delete entry</button>
    </form>

    <div class="form-actions">
      <div id="status" role="status" aria-live="polite"></div>
    </div>

    <div id="weekly-summary"></div>

    <details class="settings-panel">
      <summary>
        <span>Target settings</span>
        <small id="targetSummary"></small>
      </summary>
      <form id="targets-form" class="targets-form">
        <label>
          <span>TDEE</span>
          <input id="tdeeInput" type="number" inputmode="numeric" min="1" step="1" />
        </label>
        <label>
          <span>Protein target</span>
          <input id="proteinTargetInput" type="number" inputmode="numeric" min="1" step="1" />
        </label>
        <label>
          <span>Deficit target</span>
          <input id="deficitTargetInput" type="number" inputmode="numeric" min="0" step="1" />
        </label>
        <button class="secondary-btn" type="submit">Save targets</button>
      </form>
    </details>
  </main>

  <script src="app.js?v=20260511-0756"></script>
</body>
</html>
